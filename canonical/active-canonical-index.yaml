    runtime_pass_count: 118
    verify_pass_count: 4
  sources:
    note: >
      Tier 1 (OFFICIAL_SPEC) = 12 entries, all LOCATOR_ONLY.
      Tier 2 (PRIMARY) = 7 entries, all LIVE.
      Tier 3 (RUNTIME) = 5 entries (4 PASS, 1 UNTESTED).
      Tier 4 (LEAD_ONLY) = 7 entries.
      CAPTURED_HASHED count = 0 (forward work, see discovery-lead/).
    total: 31
    captured_hashed: 0
  source_snapshots:
    note: >
      No CAPTURED_HASHED snapshots exist yet. Promotion to CAPTURED_HASHED is
