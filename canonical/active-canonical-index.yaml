    Retrofit the system-prompt knowledge-base framework (truth passports, evidence ceiling,
    role views, source radar, answer policy) onto the Anotator8×ChatGPT×MCP lab.
    No new runtime behavior. No changes to src/**, tests/**, REPORT.md, or legacy docs.
