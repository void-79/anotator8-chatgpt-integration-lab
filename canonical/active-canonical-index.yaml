      This lab is not an SDV/automotive product. The system-prompt term "VEHICLE_DOSSIER"
      is mapped to "PRODUCT_DOSSIER" (Anotator8 v24.0.0 + lab v0.4.0 snapshot).
    products:
      - id: product-dossier-anotator8-v24-lab-v04
        name: Anotator8 + ChatGPT Integration Lab
        oem: Anotator8 team
        model: Anotator8 v24.0.0
        lab_version: 0.4.0
        generation: 24.x
        market: internal-demo (not commercial)
        trim: read-only-MCP
        software_version: lab-0.4.0 / SDK-1.29.0 / ext-apps-1.7.4
        source: canonical/product-dossier.yaml
  components:
    note: >
      "COMPONENT_RECORD" is mapped to "RUNTIME_RECORD" (Node 24, deps, FS-allowlist,
      zero shell exec, transport matrix). See canonical/runtime-record.yaml.
    count: 1
  capabilities:
