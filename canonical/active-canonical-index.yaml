  gaps:
    count: 20
    blocking_count: 3
    high_safety_count: 3
    medium_count: 8
    low_count: 6
    unknown_unknown_count: 10
    source: index/GAP_HARVEST.md
  signals:
    note: >
      "SIGNAL_RECORD" mapped to "EVENT_RECORD" (audit log line, smoke result, test result).
      See src/server/audit.ts for live event stream.
  privacy:
    note: >
      See canonical/regulatory-record.yaml (FERPA/COPPA/GDPR + RFC 9728 + RFC 6750)
      and canonical/threat-record.yaml.
  data_flows:
    note: >
      Live: projectData → Anotator8Adapter.parse → normalize → validate → tool handler
      → wrapTool → structuredContent → MCP response. No mutation. No FS write.
  blueprints:
    note: >
      8 read-only tool blueprints (see canonical/tool-record/*.yaml).
      Plus 2 cross-cutting: widget-bridge, review-prompt.
      Safe re-use: mock data, allowlisted fixtures, no real Anotator8 backend.
  tests:
