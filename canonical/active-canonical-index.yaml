      integration: 6
      contract: 4
    runner: vitest@^3.2.4
  truth_passports:
    count_target: 7
    list:
      - lab-v0.4.0
      - tool-list-capabilities
      - tool-inspect-project
      - tool-validate-project
      - decision-bridge-strategy
      - decision-auth-strategy
      - decision-no-write-tool-policy
  answer_policy:
    note: >
      See fixtures/answer/*.md (4 fixtures in v0.5.0; expand to 8 in v0.6.0).
      Every non-trivial answer must: (a) reference a truth passport, (b) state
      answer_ceiling, (c) list forbidden shortcuts, (d) propose safe next step.
  role_views:
    count_target: 4
    list:
      - 01-product-stack-tree
      - 03-protocol-transport-middleware
      - 06-failure-casebook
      - 10-final-decision-matrix
  analogs:
    note: >
      From system prompt + lab context. List in roles/07-ready-semi-ready-solutions.md.
      Examples: MCP Inspector (analog of Postman for MCP), Cloudflare Tunnel (analog
      of ngrok), official MCP examples (analog of "hello world"). Not proof, just
      inspiration for schemas.
  methods:
    note: >
      Adapter-first; evidence-classified; no mutation; allowlist-FS; zero shell.
      See canonical/assurance-case-record.yaml.
  toolchains:
    note: >
      Node 24.13.0 + TypeScript 5.9.3 + tsc + vitest 3.2.4 + tsx 4.21.0 + js-yaml (NEW in v0.5.0).
      See canonical/runtime-record.yaml § toolchains.
  regulations:
    note: >
      FERPA, COPPA, GDPR (privacy, applies because Anotator8 is education tool).
      RFC 9728, RFC 6750 (auth).
      OpenAI Apps SDK submission guidelines (vendor, not law).
      See canonical/regulatory-record.yaml.
  threats:
    note: >
      10-row threat model in canonical/threat-record.yaml. Includes:
      demo-bearer-auth, education-record exposure, widget _meta.projectData leak,
      vitest UI RCE (dev-only), MCP SDK recursion (non-fatal).
  assurance_cases:
    note: >
      Top-level assurance case: read-only + no-shell + no-arb-FS + DEMO banner.
      Sub-cases: per-tool (no mutation), per-decision (auditable).
  discovery_leads:
    count: 10
    list:
      - mcp-sdk-1.30
      - apps-sdk-post-2026-01-26
      - oauth-2.1-as-ref-impl
      - vitest-4-rolldown-windows
      - cloudflare-tunnel-mcp
      - golden-anotator8-fixture
      - reverse-proxy-mcp
      - load-test-10k-annotations
      - real-chatgpt-developer-mode-e2e
      - mcp-sampling-roots-prompts
  source_radar:
    tiers: 4
    captured_hashed: 0
    locator_only: 12
    live: 12
    lead_only: 7
  unknown_unknowns:
    count: 10
    list_source: index/GAP_HARVEST.md § Unknown Unknowns
  legacy_read_only:
    note: >
      These files must NOT be treated as canonical truth. They are historical views.
    files:
      - REPORT.md
      - docs/QA_REPORT.md
      - docs/BUILD_REPORT.md
      - docs/FINAL_REPORT.md
      - docs/AUDIT_AGAINST_DISCOVERY_FIRST_PROMPT_v1.md
      - src/** (runtime code, NOT modified)
      - tests/** (NOT modified)
      - fixtures/sample-project.anotator8.json
      - fixtures/near-real-project.anotator8.json
  rules:
    - id: markdown-is-view
      rule: Markdown (REPORT.md, docs/*.md, roles/*.md) is a generated view, not stronger truth.
    - id: yaml-beats-prose
      rule: Decision YAML beats prose. If a claim lives only in prose without a canonical record, it is a LEAD_ONLY.
    - id: truth-passport-required
      rule: Every decision and tool must have a truth passport. If absent, ceiling = NEEDS_DATA.
    - id: source-url-not-evidence
      rule: Source URL is locator-only until captured and hashed.
    - id: platform-not-exact-vehicle
      rule: Platform docs (MCP, Apps SDK) are not exact vehicle evidence (Anotator8, lab).
    - id: discovery-not-claim
      rule: Discovery leads are not claims. LEAD_ONLY in source-radar is not evidence.
    - id: analogy-not-proof
      rule: Analogies (MCP Inspector, Cloudflare Tunnel) can inspire schemas, not prove facts.
    - id: ceiling-is-min
      rule: answer_ceiling = min(vehicle_specificity, source_snapshot_state, evidence_strength, decision_status, privacy_gate, safety_gate, test_maturity, unresolved_gaps, release_readiness, exact_artifact_quality, authorization_scope, market_year_trim_software_specificity).
    - id: new-roles-allowed
      rule: New roles are allowed when repeated gaps justify them (e.g. Source Radar, Privacy, Regulatory).
    - id: no-fake-hashes
      rule: No fake sha256. A CAPTURED_HASHED entry must have a real hash; otherwise it stays LOCATOR_ONLY.
    - id: no-shell-in-validators
      rule: New validators must not use child_process / exec / spawn. Pure Node + js-yaml + fs only.
    - id: legacy-not-overwritten
      rule: Legacy files (REPORT.md, docs/QA_REPORT.md, docs/BUILD_REPORT.md, docs/AUDIT_AGAINST_DISCOVERY_FIRST_PROMPT_v1.md) are not overwritten.
