      cors-allowlist, transports, no-shell-exec-policy.
    count: 6
  claims:
    note: >
      Claims are stored inline in tool-record/, decision-record/, and product-dossier.yaml.
      Each claim has evidence_status (CONFIRMED_FOR_PLATFORM / RUNTIME / MOCK / LEAD_ONLY / UNKNOWN).
    canonical_claim_count_target: 25
  evidence:
