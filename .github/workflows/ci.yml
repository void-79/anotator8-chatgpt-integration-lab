name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: build + test + smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Unit + integration + contract tests
        run: npm test

      - name: Smoke (real HTTP/MCP roundtrip)
        run: npm run smoke

      - name: npm audit (production dependencies only)
        # Audit only production deps so dev-only moderate issues don't block CI.
        # The current known dev-only critical is vitest <4.1.0 UI server RCE;
        # the lab never starts the UI server. See docs/DEPENDENCY_AUDIT.md.
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  mcp-inspector:
    name: MCP Inspector smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Start dev server in background
        run: |
          npm run dev &
          # Wait up to 30s for the server to bind on 127.0.0.1:8787
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8787/health > /dev/null; then
              echo "Server up after ${i}s"
              break
            fi
            sleep 1
          done
      - name: Open MCP Inspector (informational; no auto-assert)
        run: |
          # The MCP Inspector is a TUI/UI tool. In CI we only assert that the
          # binary is reachable; manual interactive testing happens locally
          # via `npm run inspect`.
          npx --yes @modelcontextprotocol/inspector@latest --help | head -20
